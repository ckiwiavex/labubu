<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Khaterin ✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: #fce7f3;
      overflow-x: hidden;
    }
    .initial-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(#fce7f3, #f8d7e8);
      position: relative;
    }
    .title {
      font-family: 'Dancing Script', cursive;
      font-size: 5.5rem;
      color: #be185d;
      text-shadow: 0 0 30px rgba(190, 24, 93, 0.4);
    }
    .envelope {
      font-size: 9rem;
      cursor: pointer;
      transition: all 0.6s ease;
      animation: pulse 2s infinite;
    }
    .envelope:hover {
      transform: scale(1.15);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Animación del sobre abriéndose */
    .open-envelope {
      animation: openEnvelope 1.8s forwards;
    }
    @keyframes openEnvelope {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(8deg) scale(0.9); opacity: 0.3; }
    }

    .petal {
      position: absolute;
      font-size: 1.5rem;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 10;
    }
    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- PANTALLA INICIAL -->
  <div id="initial" class="initial-screen">
    <h1 class="title mb-12">Para Khaterin</h1>
    
    <div id="envelope" class="envelope" onclick="openEnvelope()">
      ✉️
    </div>
    
    <p class="mt-10 text-pink-600 text-xl font-light">Toca el sobre ❤️</p>
  </div>

  <!-- CONTENIDO PRINCIPAL (oculto al inicio) -->
  <div id="main-content" class="hidden">
    <section class="min-h-screen flex items-center justify-center text-center px-6 relative">
      <div>
        <h1 class="text-7xl md:text-8xl font-bold text-pink-600 mb-6" style="font-family: 'Dancing Script', cursive;">
          ¡Feliz Cumpleaños, Khaterin!
        </h1>
        <p class="text-2xl text-pink-700">Que este día sea tan hermoso como tú ✨</p>
      </div>
    </section>

    <!-- Aquí puedes añadir más secciones después -->
    <div class="text-center py-12">
      <button onclick="lanzarConfeti()" 
              class="px-10 py-5 bg-pink-500 text-white text-xl rounded-full">
        Más sorpresas 🎉
      </button>
    </div>
  </div>

  <audio id="backgroundMusic" loop>
    <source src="https://assets.mixkit.co/sfx/preview/296/296-preview.mp3" type="audio/mpeg">
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    function openEnvelope() {
      const envelope = document.getElementById('envelope');
      envelope.classList.add('open-envelope');

      // Sonido de apertura (opcional)
      setTimeout(() => {
        document.getElementById('initial').style.opacity = '0';
        
        setTimeout(() => {
          document.getElementById('initial').classList.add('hidden');
          document.getElementById('main-content').classList.remove('hidden');
          
          // Inicia música
          document.getElementById('backgroundMusic').play();
          
          // Empieza a caer pétalos
          startCherryBlossoms();
          
          // Confeti inicial
          confetti({ particleCount: 150, spread: 70, colors: ['#ec4899', '#f472b6'] });
        }, 800);
      }, 1200);
    }

    function startCherryBlossoms() {
      const colors = ['🌸', '🌺', '💗', '🩷'];
      setInterval(() => {
        const petal = document.createElement('div');
        petal.className = 'petal';
        petal.textContent = colors[Math.floor(Math.random() * colors.length)];
        
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.top = '-50px';
        petal.style.fontSize = (Math.random() * 1.8 + 1.2) + 'rem';
        petal.style.animationDuration = (Math.random() * 8 + 7) + 's';
        petal.style.opacity = Math.random() * 0.8 + 0.4;
        
        document.body.appendChild(petal);

        setTimeout(() => petal.remove(), 15000);
      }, 180);
    }

    function lanzarConfeti() {
      confetti({
        particleCount: 200,
        spread: 90,
        origin: { y: 0.6 },
        colors: ['#ec4899', '#f472b6', '#db2777']
      });
    }
  </script>
</body>
</html>
