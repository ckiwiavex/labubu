<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti zorrita💕 ✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #fce7f3, #f8fafc);
      color: #4c1d95;
    }
    .hero {
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                  url('https://source.unsplash.com/random/1920x1080/?pink,flowers') center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }
    .title {
      font-size: 5rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ec4899, #f472b6, #db2777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #f472b6; }
      to { text-shadow: 0 0 40px #ec4899; }
    }
    .heart {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .section {
      padding: 80px 20px;
    }
  </style>
</head>
<body>

  <!-- HERO - Lo primero que se ve -->
  <section class="hero">
    <div class="container mx-auto px-6">
      <i class="fas fa-heart text-6xl text-pink-400 heart mb-6"></i>
      <h1 class="title text-7xl md:text-8xl mb-4">¡Feliz Cumpleaños!</h1>
      <h2 class="text-5xl md:text-6xl text-white font-light tracking-wider">[katerin]</h2>
      <p class="text-2xl text-pink-100 mt-8">Hoy el mundo brilla más porque tú estás aquí ✨</p>
      
      <button onclick="scrollToMessage()" 
              class="mt-12 px-10 py-4 bg-pink-500 hover:bg-pink-600 text-white text-xl font-semibold rounded-full transition-all shadow-lg">
        Leer mi mensaje para ti ❤️
      </button>
    </div>
  </section>

  <!-- MENSAJE PERSONAL -->
  <section class="section bg-white">
    <div class="max-w-2xl mx-auto">
      <h2 class="text-4xl font-bold text-pink-600 mb-10 text-center">Mi regalo más especial</h2>
      <div class="bg-gradient-to-br from-pink-50 to-purple-50 p-10 rounded-3xl shadow-xl">
        <p class="text-lg leading-relaxed text-gray-700">
          Aquí escribe tu mensaje más bonito y personal... <br><br>
          Puedes contar por qué esa persona es importante para ti, un recuerdo especial, 
          lo que sientes, etc.
        </p>
      </div>
    </div>
  </section>

  <!-- GALERÍA -->
  <section class="section bg-pink-50">
    <div class="max-w-5xl mx-auto">
      <h2 class="text-4xl font-bold text-pink-600 mb-12 text-center">Nuestros momentos favoritos</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Cambia estas URLs por tus fotos reales -->
        <img src="https://source.unsplash.com/random/600x600/?friends" class="rounded-2xl shadow-md hover:scale-105 transition-transform" alt="Foto 1">
        <img src="https://source.unsplash.com/random/600x600/?smile" class="rounded-2xl shadow-md hover:scale-105 transition-transform" alt="Foto 2">
        <img src="https://source.unsplash.com/random/600x600/?party" class="rounded-2xl shadow-md hover:scale-105 transition-transform" alt="Foto 3">
      </div>
    </div>
  </section>

  <!-- BOTÓN SORPRESA -->
  <div class="text-center py-20 bg-gradient-to-b from-pink-100 to-white">
    <button onclick="lanzarSorpresa()" 
            class="px-12 py-6 bg-gradient-to-r from-pink-500 to-purple-500 text-white text-2xl font-bold rounded-full shadow-2xl hover:scale-110 transition-all">
      ¡Toca aquí para la sorpresa final! 🎉
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    function scrollToMessage() {
      document.querySelector('.section').scrollIntoView({ behavior: 'smooth' });
    }

    function lanzarSorpresa() {
      // Confeti rosa
      confetti({
        particleCount: 300,
        spread: 100,
        origin: { y: 0.6 },
        colors: ['#ec4899', '#f472b6', '#db2777', '#c026d3']
      });
      
      setTimeout(() => {
        alert("¡Te quiero mucho y deseo que este año sea increíble para ti! 🎂❤️");
      }, 800);
    }

    // Confeti suave al cargar la página
    window.onload = function() {
      setTimeout(() => {
        confetti({
          particleCount: 80,
          spread: 50,
          origin: { y: 0.8 },
          colors: ['#ec4899', '#f472b6']
        });
      }, 800);
    };
  </script>
</body>
</html>
